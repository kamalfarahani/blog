{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'base/styles.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="content-card">
      <nav class="site-nav">
        <a class="nav-link" href="{% url 'post_list' %}"><i class="fa-solid fa-book-open" aria-hidden="true"></i> Blog</a>
        <a class="nav-link" href="{% url 'about' %}"><i class="fa-solid fa-circle-user" aria-hidden="true"></i> About</a>
      </nav>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
